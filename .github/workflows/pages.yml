name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths: ['src/**', '.github/workflows/pages.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      # 配布物は src/ のみ公開(docs/ の仕様書は公開しない)。
      # 配布物本体は src/index.html。src/ 配下をそのまま公開ルートへ配置する。
      - name: Build site
        run: |
          mkdir _site
          cp -r src/. _site/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
