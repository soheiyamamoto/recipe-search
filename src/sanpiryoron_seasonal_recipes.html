<meta name="mobile-web-app-capable" content="yes">

<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">

<style>
  :root{
    --bg: #e9e4d7;
    --paper: #fffdf8;
    --ink: #2b2925;
    --ink-soft: #6b6459;
    --indigo: #223a54;
    --indigo-deep: #17283b;
    --shu: #b4382b;            /* 朱色（はんこ） */
    --line: #d8d0bd;

    --spring: #7c9a3a;         /* 若草色 */
    --summer: #1c7d8a;         /* 浅葱色 */
    --autumn: #b8601f;         /* 柿色 */
    --winter: #24478f;         /* 瑠璃色 */
    --allseason: #4a6b52;      /* 常磐色 */
  }
  *{ box-sizing: border-box; }
  body{
    font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
    line-height: 1.7;
    color: var(--ink);
    background:
      radial-gradient(1200px 400px at 50% -80px, rgba(180,56,43,0.05), transparent),
      var(--bg);
    margin: 0;
    padding: 0;
  }
  .container{
    max-width: 980px; margin: 0 auto;
    /* ノッチ・ホームバー付き端末の全画面表示でも内容が欠けないよう安全域を加算 */
    padding: calc(22px + env(safe-area-inset-top, 0px))
             calc(16px + env(safe-area-inset-right, 0px))
             calc(60px + env(safe-area-inset-bottom, 0px))
             calc(16px + env(safe-area-inset-left, 0px));
  }

  /* ===== Header / signature hanko ===== */
  header{
    position: relative;
    background: linear-gradient(160deg, var(--indigo) 0%, var(--indigo-deep) 100%);
    color: #f4efe3;
    padding: 30px 26px 26px;
    border-radius: 10px;
    margin-bottom: 22px;
    overflow: hidden;
  }
  header::before{
    content: "";
    position: absolute; inset: 0;
    background-image: repeating-linear-gradient(135deg, rgba(244,239,227,0.035) 0 2px, transparent 2px 22px);
    pointer-events: none;
  }
  .header-row{ display:flex; align-items:center; justify-content:space-between; gap:18px; position:relative; }
  header h1{
    margin: 0 0 6px 0;
    font-family: 'Shippori Mincho', serif;
    font-weight: 700;
    font-size: 26px;
    letter-spacing: 2px;
  }
  header p{ margin: 0; font-size: 13px; opacity: 0.75; letter-spacing: 0.5px; }
  .hanko{
    flex: none;
    width: 62px; height: 62px;
    border-radius: 50%;
    border: 2.5px solid var(--shu);
    color: var(--shu);
    background: rgba(244,239,227,0.06);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Shippori Mincho', serif;
    font-weight: 700;
    font-size: 22px;
    transform: rotate(-6deg);
    letter-spacing: 1px;
    box-shadow: 0 0 0 1px rgba(180,56,43,0.15) inset;
  }

  /* ===== Search ===== */
  .search-box{
    background: var(--paper);
    padding: 18px;
    border-radius: 10px;
    border: 1px solid var(--line);
    margin-bottom: 16px;
  }
  .search-box label{ display:block; font-weight: 700; margin-bottom: 8px; color: var(--indigo); font-size: 14px; }
  .search-field{ position: relative; }
  .search-field input[type="text"]{
    width: 100%;
    padding: 12px 40px 12px 14px;
    font-size: 16px;
    border: 2px solid var(--line);
    border-radius: 8px;
    outline: none;
    background: #fff;
    color: var(--ink);
    transition: border-color 0.15s;
  }
  .search-field input[type="text"]:focus{ border-color: var(--indigo); }
  .clear-btn{
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    width: 26px; height: 26px; border-radius: 50%;
    border: none; background: var(--line); color: var(--ink-soft);
    font-size: 14px; line-height: 1; cursor: pointer;
    display: none; align-items: center; justify-content: center;
  }
  .clear-btn.show{ display: flex; }
  .clear-btn:hover{ background: #c9c0a9; }

  .quick-tags{ display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
  .quick-tag{
    border: 1px solid var(--line);
    background: #f4f1e8;
    color: var(--ink-soft);
    font-size: 12px;
    padding: 5px 11px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .quick-tag:hover{ background: var(--indigo); color: #f4efe3; border-color: var(--indigo); }
  .quick-tag.active{ background: var(--shu); color: #fff; border-color: var(--shu); }

  /* ===== Season tabs ===== */
  .tabs{
    display: flex;
    background-color: #ded6c1;
    border-radius: 8px;
    padding: 4px;
    margin-bottom: 6px;
    gap: 2px;
  }
  .tab-btn{
    flex: 1;
    background: none; border: none;
    padding: 10px 6px;
    font-size: 14px; font-weight: 700;
    color: var(--ink-soft);
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.15s;
    text-align: center;
  }
  .tab-btn.active{ background-color: var(--paper); color: var(--indigo); box-shadow: 0 2px 5px rgba(0,0,0,0.08); }

  .result-count{
    font-size: 12.5px;
    color: var(--ink-soft);
    text-align: right;
    margin: 8px 4px 14px;
  }
  .result-count b{ color: var(--indigo); }

  /* ===== Cards ===== */
  .card-list{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 14px;
  }
  .card{
    background-color: var(--paper);
    border: 1px solid var(--line);
    border-top: 4px solid var(--indigo);
    padding: 16px 17px;
    border-radius: 8px;
    transition: transform 0.15s, box-shadow 0.15s;
    display: flex;
    flex-direction: column;
  }
  .card:hover{ transform: translateY(-3px); box-shadow: 0 8px 18px rgba(23,40,59,0.10); }
  .card.hidden{ display: none; }

  .season-badge{
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 9px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 9px;
    width: fit-content;
    letter-spacing: 0.5px;
  }
  .badge-spring{ background-color: var(--spring); }
  .badge-summer{ background-color: var(--summer); }
  .badge-autumn{ background-color: var(--autumn); }
  .badge-winter{ background-color: var(--winter); }
  .badge-all{ background-color: var(--allseason); }

  .card-title{ margin: 0 0 8px 0; font-size: 16px; font-weight: 700; font-family: 'Shippori Mincho', serif; }
  .card-title a{ color: var(--indigo); text-decoration: none; }
  .card-title a:hover{ text-decoration: underline; color: var(--shu); }

  .card-meta{ font-size: 13px; color: var(--ink-soft); margin-bottom: 10px; flex-grow: 1; }
  .card-tags{ margin-top: auto; }
  .tag{
    display: inline-block;
    background-color: #f0ece1;
    color: var(--ink-soft);
    padding: 2px 9px;
    font-size: 11.5px;
    border-radius: 4px;
    margin: 0 5px 5px 0;
  }

  footer{ text-align: center; margin-top: 26px; font-size: 12px; color: var(--ink-soft); padding: 10px; }

  .no-results{
    text-align: center;
    padding: 34px 20px;
    color: var(--ink-soft);
    background-color: var(--paper);
    border: 1px dashed var(--line);
    border-radius: 8px;
    display: none;
    grid-column: 1 / -1;
  }
  .no-results strong{ display:block; color: var(--indigo); font-size: 15px; margin-bottom: 4px; }

  @media (max-width: 480px){
    header h1{ font-size: 21px; }
    .hanko{ width: 50px; height: 50px; font-size: 18px; }
    .container{
      padding-top: calc(12px + env(safe-area-inset-top, 0px));
      padding-bottom: calc(40px + env(safe-area-inset-bottom, 0px));
    }
    header{ padding: 22px 18px 18px; }
  }
</style>
</head>

<div class="container">

  <div class="search-box">

      <button type="button" class="clear-btn" id="clear-btn" onclick="clearSearch()" aria-label="検索をクリア">✕</button>
    </div>
    <div class="quick-tags" id="quick-tags"><!-- JSで自動生成 --></div>
  </div>

  <div class="tabs" id="season-tabs">
    <button class="tab-btn active" data-season="all">全て</button>
    <button class="tab-btn" data-season="spring">春</button>
    <button class="tab-btn" data-season="summer">夏</button>
    <button class="tab-btn" data-season="autumn">秋</button>
    <button class="tab-btn" data-season="winter">冬</button>
  </div>

  <div class="result-count" id="result-count"></div>

  <div class="card-list" id="recipe-list"><!-- JSで自動生成 --></div>

  <div class="no-results" id="no-results">
    <strong>該当するレシピが見つかりませんでした</strong>
    別のキーワードや季節タブをお試しください。
  </div>

  <footer>
    <p>※LINEで共有された方は、このまま画面上で材料検索や動画へのジャンプが可能です。</p>
  </footer>
</div>

  const SEASON_LABEL = { spring: '春のレシピ', summer: '夏のレシピ', autumn: '秋のレシピ', winter: '冬のレシピ', all: '通年レシピ' };
  const SEASON_BADGE_CLASS = { spring: 'badge-spring', summer: 'badge-summer', autumn: 'badge-autumn', winter: 'badge-winter', all: 'badge-all' };
  const HANKO_CHAR = { spring: '春', summer: '夏', autumn: '秋', winter: '冬', all: '全' };

  let currentSeason = 'all';
  let activeQuickTag = null;

  function renderCards(){
    const list = document.getElementById('recipe-list');
    list.innerHTML = recipes.map((r, i) => `
      <div class="card" data-index="${i}" data-season="${r.season}" data-materials="${(r.materials||[]).join(' ').toLowerCase()}">
        <span class="season-badge ${SEASON_BADGE_CLASS[r.season]}">${SEASON_LABEL[r.season]}</span>
        <h3 class="card-title"><a href="${r.url}" target="_blank" rel="noopener">${r.title}</a></h3>
        <div class="card-meta">${r.desc}</div>
        <div class="card-tags">${(r.tags||[]).map(t => `<span class="tag">材料: ${t}</span>`).join('')}</div>
      </div>
    `).join('');
  }

  function renderQuickTags(){
    // 登場頻度の高い材料タグ上位14件をクイックタグ化
    const freq = new Map();
    recipes.forEach(r => (r.tags||[]).forEach(t => freq.set(t, (freq.get(t)||0) + 1)));
    const topTags = Array.from(freq.entries()).sort((a,b) => b[1]-a[1]).slice(0, 14).map(e => e[0]);
    const box = document.getElementById('quick-tags');
    box.innerHTML = topTags.map(t =>
      `<button type="button" class="quick-tag" data-tag="${t}">${t}</button>`
    ).join('');
    box.querySelectorAll('.quick-tag').forEach(btn => {
      btn.addEventListener('click', () => {
        const tag = btn.getAttribute('data-tag');
        const input = document.getElementById('material-search');
        if (activeQuickTag === tag){
          activeQuickTag = null;
          input.value = '';
        } else {
          activeQuickTag = tag;
          input.value = tag;
        }
        filterRecipes();
      });
    });
  }

  function setSeason(season, btn){
    currentSeason = season;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('hanko-stamp').textContent = HANKO_CHAR[season];
    filterRecipes();
  }

  function clearSearch(){
    document.getElementById('material-search').value = '';
    activeQuickTag = null;
    filterRecipes();
  }

  function filterRecipes(){
    const raw = document.getElementById('material-search').value;
    const searchInput = raw.toLowerCase().trim();
    document.getElementById('clear-btn').classList.toggle('show', raw.length > 0);

    document.querySelectorAll('.quick-tag').forEach(btn => {
      btn.classList.toggle('active', activeQuickTag && btn.getAttribute('data-tag') === activeQuickTag);
    });

    const cards = document.querySelectorAll('.card');
    let visibleCount = 0;

    cards.forEach(card => {
      const season = card.getAttribute('data-season');
      const materials = card.getAttribute('data-materials');
      const title = card.querySelector('.card-title').textContent.toLowerCase();

      const matchesSeason = (currentSeason === 'all' || season === currentSeason || season === 'all');
      const matchesSearch = (!searchInput || materials.includes(searchInput) || title.includes(searchInput));

      if (matchesSeason && matchesSearch){
        card.classList.remove('hidden');
        visibleCount++;
      } else {
        card.classList.add('hidden');
      }
    });

    document.getElementById('no-results').style.display = visibleCount === 0 ? 'block' : 'none';
    document.getElementById('result-count').textContent = `全${recipes.length}件中 ${visibleCount}件を表示`;
  }

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => setSeason(btn.getAttribute('data-season'), btn));
  });

  renderCards();
  renderQuickTags();
  filterRecipes();
</script>
